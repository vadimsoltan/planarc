services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["/bin/sh", "start.sh"]
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-long-random-string}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      FRONTEND_DIST_DIR: /app/frontend-dist
      PYTHONPATH: /app/backend
      PORT: ${PORT:-8000}
    volumes:
      - ./data:/app/data
    ports:
      - "${PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
